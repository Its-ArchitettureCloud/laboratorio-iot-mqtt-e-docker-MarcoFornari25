version: "3.9"
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
  sensor:
    build: ./sensor
    container_name: sensor-01
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      SENSOR_ID: sensore01
      SEND_INTERVAL: 5
    depends_on:
      - mosquitto
